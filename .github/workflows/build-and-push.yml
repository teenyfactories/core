name: Build and Push Agent Image

on:
  push:
    branches: [main]

env:
  GHCR_IMAGE: ghcr.io/teenyfactories/agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          TAG=dev GHCR_IMAGE=${{ env.GHCR_IMAGE }} PUSH=true ./build.sh
