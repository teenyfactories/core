# Single staged pipeline for the core repo.
#
# Stages:
#   1. license-check (python, base install)              — gating, PR + push
#      license-check-extras (python, [all,data] extras)  — gating, PR + push
#   2. build-and-push (agent image)                      — runs on push to main,
#                                                          needs BOTH license
#                                                          checks. Publishes to
#                                                          GHCR + Docker Hub.
#   3. publish-pypi (teenyfactories wheel + sdist)       — runs on push to main,
#                                                          needs BOTH license
#                                                          checks. Version =
#                                                          0.1.0.devYYYYMMDD
#                                                          (UTC). PEP 440 dev
#                                                          pre-release — pip
#                                                          installs need `--pre`.
#                                                          Idempotent — skips if
#                                                          today's version is
#                                                          already on PyPI.
#
# Both license checks are gating: any copyleft (AGPL / GPL / SSPL / CC-BY-SA)
# in the base install OR the [all,data] extras fails the pipeline. The
# defensive grep guards against accidental copyleft reintroduction in future
# dependency bumps.

name: on_push

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  GHCR_IMAGE: ghcr.io/teenyfactories/agent

jobs:
  # ── Stage 1 — license compliance ──────────────────────────────────────────

  license-check:
    name: license-check (python, base)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: install package + pip-licenses
        run: |
          pip install --upgrade pip
          pip install -e ./python
          pip install pip-licenses
      - name: scan licenses
        run: |
          pip-licenses --format=csv --no-version > licenses.csv
          cat licenses.csv
          if grep -E -i ',\s*"?(AGPL|GNU Affero|GPL-2|GPL-3|GNU General Public License v[23]|SSPL|CC-BY-SA)' licenses.csv; then
            echo "::error::Found a copyleft license incompatible with proprietary distribution."
            exit 1
          fi
          echo "OK — no copyleft killers in base install."

  license-check-extras:
    name: license-check (python, [all,data] extras)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: install package with [all,data] extras
        run: |
          pip install --upgrade pip
          pip install -e "./python[all,data]"
          pip install pip-licenses
      - name: scan licenses (gating)
        run: |
          pip-licenses --format=csv --no-version > licenses-extras.csv
          cat licenses-extras.csv
          if grep -E -i ',\s*"?(AGPL|GNU Affero|GPL-2|GPL-3|GNU General Public License v[23]|SSPL|CC-BY-SA)' licenses-extras.csv; then
            echo "::error::Found a copyleft license in [all,data] extras — incompatible with proprietary distribution."
            echo "::error::Known offender: PyMuPDF in [data] is AGPL-3.0. Replace with a permissive-licence alternative (pypdf, pdfminer.six), remove from [data], or obtain an Artifex commercial license."
            exit 1
          fi
          echo "OK — no copyleft in [all,data] extras."

  # ── Stage 2 — build + push image to GHCR and Docker Hub ──────────────────
  # Only fires on push to main, only if BOTH license checks passed. Build
  # once locally, then push to both registries with the same digest.

  build-and-push:
    name: build-and-push (agent:dev image, GHCR + Docker Hub)
    needs: [license-check, license-check-extras]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to GHCR
        run: |
          TAG=dev GHCR_IMAGE=${{ env.GHCR_IMAGE }} PUSH=true ./python/build.sh

      - name: Retag + push to Docker Hub
        run: |
          docker tag "${{ env.GHCR_IMAGE }}:dev" "${{ secrets.DOCKERHUB_USERNAME }}/agent:dev"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/agent:dev"

  # ── Stage 3 — publish to PyPI ────────────────────────────────────────────
  # Date-based versioning: 0.1.0.devYYYYMMDD (UTC). PEP 440 dev pre-release —
  # `pip install teenyfactories` won't pick these up without `--pre`. One
  # publish per day, idempotent — if today's version is already on PyPI, the
  # job logs and skips rather than failing. Requires the `PYPI_API_TOKEN`
  # repo secret.

  publish-pypi:
    name: publish (PyPI, 0.1.0.devYYYYMMDD)
    needs: [license-check, license-check-extras]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Compute date-based version
        id: version
        run: |
          VERSION="0.1.0.dev$(date -u +%Y%m%d)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION"

      - name: Check whether version is already on PyPI
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            "https://pypi.org/pypi/teenyfactories/${{ steps.version.outputs.version }}/json")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version ${{ steps.version.outputs.version }} already on PyPI — skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version not yet on PyPI — will publish."
          fi

      - name: Pin version in pyproject.toml
        if: steps.check.outputs.exists == 'false'
        working-directory: python
        run: |
          sed -i 's/^version = .*/version = "${{ steps.version.outputs.version }}"/' pyproject.toml
          grep '^version' pyproject.toml

      - name: Build sdist + wheel
        if: steps.check.outputs.exists == 'false'
        working-directory: python
        run: |
          python -m pip install --upgrade pip build
          python -m build
          ls -la dist/

      - name: Upload to PyPI
        if: steps.check.outputs.exists == 'false'
        working-directory: python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade twine
          twine upload --non-interactive dist/*
