# Single staged pipeline for the core repo.
#
# Stages:
#   1. license-check (python, base install)              — gating, PR + push
#      license-check-extras (python, [all,data] extras)  — gating, PR + push
#   2. build-and-push (agent image)                      — runs on every push,
#                                                          needs BOTH license
#                                                          checks. Publishes to
#                                                          GHCR + Docker Hub.
#                                                          Image tagged from
#                                                          branch: main →
#                                                          :latest, dev → :dev,
#                                                          test → :test,
#                                                          feature-foo →
#                                                          :feature-foo
#                                                          (slashes → dashes).
#   3. publish-pypi (teenyfactories wheel + sdist)       — runs on push to main,
#                                                          needs BOTH license
#                                                          checks. Version =
#                                                          pyproject.toml
#                                                          [project].version
#                                                          (lockstep-checked vs
#                                                          __version__.py).
#                                                          Idempotent — skips if
#                                                          that version is
#                                                          already on PyPI.
#   4. publish-npm (teenyfactories placeholder package)   — runs on push to main,
#                                                          needs BOTH license
#                                                          checks. Version =
#                                                          0.1.0-dev.YYYYMMDD
#                                                          (semver pre-release).
#                                                          Published under the
#                                                          `dev` dist-tag — npm
#                                                          installs need
#                                                          `@dev`. Idempotent
#                                                          like the PyPI job.
#                                                          Placeholder shell
#                                                          until the JS port
#                                                          actually lands.
#
# Both license checks are gating: any copyleft (AGPL / GPL / SSPL / CC-BY-SA)
# in the base install OR the [all,data] extras fails the pipeline. The
# defensive grep guards against accidental copyleft reintroduction in future
# dependency bumps.

name: on_push

on:
  pull_request:
    branches: [main, dev, test, cyberrev, simply]
  push:
    branches: [main, dev, test, cyberrev, simply]

env:
  GHCR_IMAGE: ghcr.io/teenyfactories/agent

jobs:
  # ── Stage 1 — license compliance ──────────────────────────────────────────

  license-check:
    name: license-check (python, base)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: install package + pip-licenses
        run: |
          pip install --upgrade pip
          pip install -e ./python
          pip install pip-licenses
      - name: scan licenses
        run: |
          pip-licenses --format=csv --no-version > licenses.csv
          cat licenses.csv
          if grep -E -i ',\s*"?(AGPL|GNU Affero|GPL-2|GPL-3|GNU General Public License v[23]|SSPL|CC-BY-SA)' licenses.csv; then
            echo "::error::Found a copyleft license incompatible with proprietary distribution."
            exit 1
          fi
          echo "OK — no copyleft killers in base install."

  license-check-extras:
    name: license-check (python, [all,data] extras)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: install package with [all,data] extras
        run: |
          pip install --upgrade pip
          pip install -e "./python[all,data]"
          pip install pip-licenses
      - name: scan licenses (gating)
        run: |
          pip-licenses --format=csv --no-version > licenses-extras.csv
          cat licenses-extras.csv
          if grep -E -i ',\s*"?(AGPL|GNU Affero|GPL-2|GPL-3|GNU General Public License v[23]|SSPL|CC-BY-SA)' licenses-extras.csv; then
            echo "::error::Found a copyleft license in [all,data] extras — incompatible with proprietary distribution."
            echo "::error::Known offender: PyMuPDF in [data] is AGPL-3.0. Replace with a permissive-licence alternative (pypdf, pdfminer.six), remove from [data], or obtain an Artifex commercial license."
            exit 1
          fi
          echo "OK — no copyleft in [all,data] extras."

  # ── Stage 2 — build + push image to GHCR and Docker Hub ──────────────────
  # Only fires on push to main, only if BOTH license checks passed. Build
  # once locally, then push to both registries with the same digest.

  build-and-push:
    name: build-and-push (agent image, multi-arch, GHCR + Docker Hub)
    needs: [license-check, license-check-extras]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Compute image tag from branch
        id: tag
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [ "$BRANCH" = "main" ]; then
            TAG=latest
          else
            TAG=$(echo "$BRANCH" | tr '/' '-')
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Branch=${BRANCH} → image tag :${TAG}"

      - name: Compute build provenance
        id: provenance
        run: |
          echo "sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # TEMP (2026-05-30): single-arch builds for dev speed. arm64 cross-build
      # via QEMU is 3-10x slower than native amd64. Restore arm64 by adding
      # back the QEMU step + `linux/amd64,linux/arm64` platforms when ready
      # to ship multi-arch again.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build + push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./python
          file: ./python/Dockerfile.build
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/agent:${{ steps.tag.outputs.tag }}
          build-args: |
            BUILD_SHA=${{ steps.provenance.outputs.sha }}
            BUILD_DATE=${{ steps.provenance.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ── Stage 3 — publish to PyPI ────────────────────────────────────────────
  # Source-version-driven: publishes the version declared in python/pyproject.toml
  # (kept in lockstep with teenyfactories/__version__.py — a guard step enforces
  # it). Idempotent per version — if that version is already on PyPI the job logs
  # and skips rather than failing. To release, bump the version in a commit to
  # main. Requires the `PYPI_API_TOKEN` repo secret.

  publish-pypi:
    name: publish (PyPI — pyproject version)
    needs: [license-check, license-check-extras]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Read package version
        id: version
        working-directory: python
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Verify __version__.py is in lockstep with pyproject
        working-directory: python
        run: |
          RUNTIME=$(python -c "import importlib.util as u; s=u.spec_from_file_location('v','teenyfactories/__version__.py'); m=u.module_from_spec(s); s.loader.exec_module(m); print(m.__version__)")
          if [ "$RUNTIME" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::version drift — pyproject=${{ steps.version.outputs.version }} but __version__.py=$RUNTIME"
            exit 1
          fi
          echo "version consistent: $RUNTIME"

      - name: Check whether version is already on PyPI
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            "https://pypi.org/pypi/teenyfactories/${{ steps.version.outputs.version }}/json")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version ${{ steps.version.outputs.version }} already on PyPI — skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version not yet on PyPI — will publish."
          fi

      - name: Build sdist + wheel
        if: steps.check.outputs.exists == 'false'
        working-directory: python
        run: |
          python -m pip install --upgrade pip build
          python -m build
          ls -la dist/

      - name: Upload to PyPI
        if: steps.check.outputs.exists == 'false'
        working-directory: python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade twine
          twine upload --non-interactive dist/*
